<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>ClutchMate Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/meyer-reset/2.0/reset.min.css">
</head>
<style>
html,
body {
  width: 100%;
  min-height: 100%;
}

body {
  background:
    radial-gradient(circle at top left, rgba(249, 115, 22, 0.35), transparent 35%),
    radial-gradient(circle at bottom right, rgba(34, 197, 94, 0.18), transparent 28%),
    linear-gradient(135deg, #020617 0%, #0f172a 45%, #111827 100%);
  background-attachment: fixed;
  position: relative;
  width: 100%;
  font-size: 14px;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  font-weight: 400;
  -webkit-font-smoothing: antialiased;
  display: flex;
  align-items: flex-start;
  justify-content: center;
  min-height: 100vh;
  padding: 24px 16px;
  box-sizing: border-box;
}

form {
  position: relative;
  display: block;
  width: 100%;
  max-width: 480px;
  background: rgba(15, 23, 42, 0.82);
  margin: auto 0;
  padding: 2em;
  box-sizing: border-box;
  border: 1px solid rgba(255, 255, 255, 0.12);
  border-radius: 12px;
  font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
  box-shadow: 0 30px 80px rgba(2, 6, 23, 0.42);
  backdrop-filter: blur(18px);
}

form .svgContainer {
  position: relative;
  width: 150px;
  height: 150px;
  margin: 0 auto 1.5em;
  border-radius: 50%;
  pointer-events: none;
}

form .svgContainer div {
  position: relative;
  width: 100%;
  height: 0;
  overflow: hidden;
  border-radius: 50%;
  padding-bottom: 100%;
}

form .svgContainer .mySVG {
  position: absolute;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

form .svgContainer:after {
  content: "";
  position: absolute;
  top: 0;
  left: 0;
  z-index: 10;
  width: inherit;
  height: inherit;
  box-sizing: border-box;
  border: solid 2.5px #f97316;
  border-radius: 50%;
}

form .inputGroup {
  margin: 0 0 2em;
  padding: 0;
  position: relative;
}

form .inputGroup:last-of-type {
  margin-bottom: 0;
}

form label {
  margin: 0 0 8px;
  display: block;
  font-size: 14px;
  color: #cbd5e1;
  font-weight: 600;
  font-family: inherit;
}

form input[type=email],
form input[type=text],
form input[type=number],
form input[type=url],
form input[type=search],
form input[type=password] {
  display: block;
  margin: 0;
  padding: 12px 16px;
  background-color: rgba(148, 163, 184, 0.12);
  border: solid 1px rgba(255, 255, 255, 0.12);
  border-radius: 8px;
  -webkit-appearance: none;
  box-sizing: border-box;
  width: 100%;
  height: 48px;
  font-size: 16px;
  color: #e2e8f0;
  font-weight: 400;
  font-family: inherit;
  transition: all 0.3s ease;
}

form input[type=email]:focus,
form input[type=text]:focus,
form input[type=number]:focus,
form input[type=url]:focus,
form input[type=search]:focus,
form input[type=password]:focus {
  outline: none;
  background-color: rgba(148, 163, 184, 0.15);
  border-color: rgba(249, 115, 22, 0.9);
  box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.12);
}

form button {
  display: block;
  margin: 0;
  padding: 12px 16px;
  background: linear-gradient(135deg, #f97316, #fb7185);
  border: none;
  border-radius: 8px;
  box-sizing: border-box;
  box-shadow: 0 14px 30px rgba(249, 115, 22, 0.24);
  width: 100%;
  height: 48px;
  font-size: 16px;
  color: #fff7ed;
  font-weight: 600;
  font-family: inherit;
  transition: all 0.3s ease;
  cursor: pointer;
}

form button:hover,
form button:active {
  transform: translateY(-2px);
  box-shadow: 0 20px 40px rgba(249, 115, 22, 0.35);
}

form .formTitle {
  text-align: center;
  margin-bottom: 0.35em;
  color: #FFFFFF;
  font-size: 28px;
  font-weight: 700;
}

form .formSubtitle {
  text-align: center;
  margin-bottom: 1.75em;
  color: #94a3b8;
  font-size: 15px;
  line-height: 1.45;
}

form .inputGroup1 .helper {
  position: absolute;
  z-index: 1;
  font-family: inherit;
}

form .inputGroup1 .helper1 {
  top: 0;
  left: 0;
  transform: translate(16px, 34px) scale(1);
  transform-origin: 0 0;
  color: #94a3b8;
  font-size: 16px;
  font-weight: 400;
  opacity: 0.7;
  pointer-events: none;
  transition: all 0.3s ease;
}

form .inputGroup1.focusWithText .helper {
  transform: translate(16px, 26px) scale(0.75);
  opacity: 0;
  color: #f97316;
}

form .inputGroup2 input[type=password] {
  padding: 12px 16px;
}

form .inputGroup2 input[type=text] {
  padding: 12px 16px;
}

form .passwordField input[type=password],
form .passwordField input[type=text] {
  padding-right: 96px;
}

form .inputGroup2 #showPasswordToggle {
  display: block;
  padding: 0 0 0 1.2em;
  position: absolute;
  top: -3px;
  right: 7px;
  font-size: 14px;
}

form .inputGroup2 #showPasswordToggle input {
  position: absolute;
  z-index: -1;
  opacity: 0;
}

form .inputGroup2 #showPasswordToggle .indicator {
  position: absolute;
  top: 0;
  left: 0;
  height: 16px;
  width: 16px;
  background-color: rgba(148, 163, 184, 0.12);
  border: solid 1px rgba(255, 255, 255, 0.12);
  border-radius: 4px;
}

form .inputGroup2 #showPasswordToggle .indicator:after {
  content: "";
  position: absolute;
  left: 4px;
  top: 2px;
  width: 6px;
  height: 10px;
  border: solid #f97316;
  border-width: 0 2px 2px 0;
  transform: rotate(45deg);
  visibility: hidden;
}

form .inputGroup2 #showPasswordToggle input:checked~.indicator:after {
  visibility: visible;
}

form .inputGroup2 #showPasswordToggle input:focus~.indicator,
form .inputGroup2 #showPasswordToggle input:hover~.indicator {
  border-color: rgba(249, 115, 22, 0.9);
}

form .inputGroup2 #showPasswordToggle input:disabled~.indicator {
  opacity: 0.5;
}

form .inputGroup2 #showPasswordToggle input:disabled~.indicator:after {
  visibility: hidden;
}

form .helperText {
  margin-top: 8px;
  font-size: 13px;
  color: #94a3b8;
  line-height: 1.45;
}

form .loginLink {
  margin-top: 1.25em;
  text-align: center;
  color: #94a3b8;
  font-size: 14px;
}

form .loginLink a {
  color: #f97316;
  font-weight: 600;
  text-decoration: none;
}

form .loginLink a:hover {
  text-decoration: underline;
}

@media (max-width: 560px) {
  body {
    padding: 14px;
  }

  form {
    padding: 1.5em;
  }

  form .passwordField input[type=password],
  form .passwordField input[type=text] {
    padding-right: 16px;
  }

  form .inputGroup2 #showPasswordToggle {
    position: static;
    padding-left: 1.4em;
    margin-top: 10px;
  }
}

</style>

<script>
  // Resolve the backend origin for both Flask-served and local static-dev usage.

      if (isLocalHost && window.location.port && window.location.port !== "5000") {

      }
      return window.location.origin;

var textInputs = document.querySelectorAll('.trackText'),

var activeTextInput, activeElement, curEmailIndex, screenCenter, svgCoords, fieldCoords, fieldScrollMax, chinMin = .5, dFromC, mouthStatus = "small", blinking, eyeScale = 1, eyesCovered = false, showPasswordClicked = false;
var eyeLCoords, eyeRCoords, noseCoords, mouthCoords, eyeLAngle, eyeLX, eyeLY, eyeRAngle, eyeRX, eyeRY, noseAngle, noseX, noseY, mouthAngle, mouthX, mouthY, mouthR, chinX, chinY, chinS, faceX, faceY, faceSkew, eyebrowSkew, outerEarX, outerEarY, hairX, hairS;

function getTextWidth(input, text) {
    var canvas = getTextWidth.canvas || (getTextWidth.canvas = document.createElement('canvas'));
    var context = canvas.getContext('2d');

    context.font = styles.font;
    return context.measureText(text).width;
}

function getCaretTarget(input) {
    var inputStyles = getComputedStyle(input);
    var inputCoords = getPosition(input);
    var carPos = input.selectionEnd;

    if (carPos == null || carPos == 0) {
        carPos = input.value.length;
    }

    var leftPadding = parseFloat(inputStyles.paddingLeft) || 0;
    var rightPadding = parseFloat(inputStyles.paddingRight) || 0;
    var textBeforeCaret = input.value.substring(0, carPos);
    var caretOffset = getTextWidth(input, textBeforeCaret) - input.scrollLeft;
    var usableWidth = input.clientWidth - leftPadding - rightPadding;
    var clampedOffset = Math.max(0, Math.min(caretOffset, usableWidth));

    return {
        x: inputCoords.x + leftPadding + clampedOffset,
        y: inputCoords.y + (input.offsetHeight / 2)
    };
}

function calculateFaceMove() {
    if (!activeTextInput) {
        return;
    }
    var caretCoords = getCaretTarget(activeTextInput);
    var inputCoords = getPosition(activeTextInput);
    var inputCenterX = inputCoords.x + (activeTextInput.clientWidth / 2);
    var inputCenterY = inputCoords.y + (activeTextInput.offsetHeight / 2);
    var relativeX = (caretCoords.x - inputCenterX) / Math.max(1, (activeTextInput.clientWidth / 2));
    var relativeY = (caretCoords.y - inputCenterY) / Math.max(1, activeTextInput.offsetHeight);

    relativeX = Math.max(-1, Math.min(1, relativeX));
    relativeY = Math.max(-1, Math.min(1, relativeY));

    dFromC = relativeX * 100;
    eyeLX = relativeX * 12;
    eyeLY = relativeY * 6;
    eyeRX = relativeX * 12;
    eyeRY = relativeY * 6;
    noseX = relativeX * 18;
    noseY = relativeY * 8;
    mouthX = relativeX * 16;
    mouthY = relativeY * 8;
    mouthR = relativeX * 6;
    chinX = mouthX * .8;
    chinY = mouthY * .5;
    chinS = 1 - ((dFromC * .15) / 100);
    if (chinS > 1) {
        chinS = 1 - (chinS - 1);
        if (chinS < chinMin) {
            chinS = chinMin;
        }
    }
    faceX = mouthX * .3;
    faceY = mouthY * .4;
    faceSkew = relativeX * 5;
    eyebrowSkew = relativeX * 15;

    outerEarY = relativeY * 4;
    hairX = relativeX * 6;

    gsap.to(chin, 1, { x: chinX, y: chinY, scaleY: chinS, ease: "expo.out" });
    gsap.to(face, 1, { x: faceX, y: faceY, skewX: faceSkew, transformOrigin: "center top", ease: "expo.out" });
    gsap.to(eyebrow, 1, { x: faceX, y: faceY, skewX: eyebrowSkew, transformOrigin: "center top", ease: "expo.out" });

    gsap.to(outerEarR, 1, { x: outerEarX, y: outerEarY, ease: "expo.out" });

};

function onTextInput() {
    if (!activeTextInput) {
        return;
    }

    calculateFaceMove();

    // very crude email validation to trigger effects

            mouthStatus = "medium";
            gsap.to([mouthBG, mouthOutline, mouthMaskPath], 1, { morphSVG: mouthMediumBG, ease: "expo.out" });

function initSignupForm() {
    svgCoords = getPosition(mySVG);
    screenCenter = svgCoords.x + (mySVG.offsetWidth / 2);
    eyeLCoords = { x: svgCoords.x + 84, y: svgCoords.y + 76 };
    eyeRCoords = { x: svgCoords.x + 113, y: svgCoords.y + 76 };
    noseCoords = { x: svgCoords.x + 97, y: svgCoords.y + 81 };
    mouthCoords = { x: svgCoords.x + 100, y: svgCoords.y + 100 };

    textInputs.forEach(function (input) {
        input.addEventListener('focus', onTextFocus);
        input.addEventListener('blur', onTextBlur);
        input.addEventListener('input', function (e) {
            activeTextInput = e.target;
            onTextInput();
        });
        input.addEventListener('click', function (e) {
            activeTextInput = e.target;
            onTextInput();
        });
        input.addEventListener('keyup', function (e) {
            activeTextInput = e.target;
            onTextInput();
        });
    });

    passwordInputs.forEach(function (input) {
        input.addEventListener('focus', onPasswordFocus);
        input.addEventListener('blur', onPasswordBlur);
    });

    showPasswordCheck.addEventListener('change', onPasswordToggleChange);
    showPasswordCheck.addEventListener('focus', onPasswordToggleFocus);
    showPasswordCheck.addEventListener('blur', onPasswordToggleBlur);
    showPasswordCheck.addEventListener('click', onPasswordToggleClick);
    showPasswordToggle.addEventListener('mouseup', onPasswordToggleMouseUp);
    showPasswordToggle.addEventListener('mousedown', onPasswordToggleMouseDown);

    gsap.set(armL, { x: -93, y: 220, rotation: 105, transformOrigin: "top left" });
    gsap.set(armR, { x: -93, y: 220, rotation: -105, transformOrigin: "top right" });

    gsap.set(mouth, { transformOrigin: "center center" });

    startBlinking(5);

    if (isMobileDevice()) {
        passwordInputs.forEach(function (input) {
            input.type = "text";
        });
        showPasswordCheck.checked = true;
        gsap.set(twoFingers, { transformOrigin: "bottom left", rotation: 30, x: -9, y: -2, ease: "power2.inOut" });
    }

    window.addEventListener('resize', function () {
        svgCoords = getPosition(mySVG);
        screenCenter = svgCoords.x + (mySVG.offsetWidth / 2);
        eyeLCoords = { x: svgCoords.x + 84, y: svgCoords.y + 76 };
        eyeRCoords = { x: svgCoords.x + 113, y: svgCoords.y + 76 };
        noseCoords = { x: svgCoords.x + 97, y: svgCoords.y + 81 };
        mouthCoords = { x: svgCoords.x + 100, y: svgCoords.y + 100 };
    });
}

// Form submission handler
document.getElementById('signup').addEventListener('click', async function(e) {
    e.preventDefault();

    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim().toLowerCase();
    const username = document.getElementById('signupUsername').value.trim();
    const password = document.getElementById('signupPassword').value;
    const confirmPassword = document.getElementById('signupConfirmPassword').value;

    // Basic validation
    if (!name || !email || !username || !password || !confirmPassword) {
        alert('Please fill in all fields');
        return;
    }

    if (password !== confirmPassword) {
        alert('Passwords do not match');
        return;
    }

    if (password.length < 6) {
        alert('Password must be at least 6 characters');
        return;
    }

    try {
        const response = await fetch(`${API_BASE_URL}/auth/signup`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                name: name,
                email: email,
                username: username,
                password: password
            })
        });

        const data = await response.json();

        if (response.ok) {
            // Store token from signup
            if (data.token) {
                localStorage.setItem('clutchmate_token', data.token);
            }
            alert('Account created successfully! Let\'s personalize your experience...');
            window.location.href = '/personalize';
        } else {
            alert(data.error || 'Signup failed');
        }
    } catch (error) {
        alert('Network error. Please try again.');
        console.error('Signup error:', error);
    }
});

initSignupForm();
